<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 3; rx: 18; }
      .title { font: 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #0f172a; }
      .sub { font: 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #334155; }
      .arrow { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#m); }
      .note { font: 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #475569; }
    </style>
    <marker id="m" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect x="40" y="110" width="220" height="140" class="box"/>
  <text x="150" y="165" text-anchor="middle" class="title">Prompt</text>
  <text x="150" y="200" text-anchor="middle" class="sub">Task request</text>

  <rect x="320" y="110" width="220" height="140" class="box"/>
  <text x="430" y="165" text-anchor="middle" class="title">Execute</text>
  <text x="430" y="200" text-anchor="middle" class="sub">Draft / run</text>

  <rect x="600" y="110" width="220" height="140" class="box"/>
  <text x="710" y="165" text-anchor="middle" class="title">Trace</text>
  <text x="710" y="200" text-anchor="middle" class="sub">What worked?</text>

  <rect x="880" y="110" width="260" height="140" class="box"/>
  <text x="1010" y="165" text-anchor="middle" class="title">Skill</text>
  <text x="1010" y="200" text-anchor="middle" class="sub">SOP + guardrails</text>

  <path d="M260 180 L320 180" class="arrow"/>
  <path d="M540 180 L600 180" class="arrow"/>
  <path d="M820 180 L880 180" class="arrow"/>

  <path d="M1010 250 C 1010 320, 180 320, 180 260" class="arrow"/>
  <text x="600" y="330" text-anchor="middle" class="note">Run once → distill stable steps → reuse many times</text>
</svg>
