name: CD Pipeline, Deploy to Tencent Cloud Server

on:
  # CD 流水线触发方式
  workflow_dispatch: # 手动点击触发
    inputs:
      image_digest:
        description: '镜像摘要 (SHA256)'
        required: false
        default: ''
  workflow_run:
    # 当 CI 流水线成功完成后自动触发
    workflows:
      - "CI Pipeline, To Alibaba Cloud Container Registry"
    types:
      - completed

# 定义环境变量
env:
  REGISTRY: ${{ secrets.ACR_REGISTRY }} # 阿里云ACR镜像仓库
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }} # 阿里云ACR命名空间
  IMAGE_NAME: ${{ github.event.repository.name }} # 镜像名称

jobs:
  deploy-to-server:
    # 仅在 CI 成功完成时运行
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to target server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # 拉取最新代码
            cd ~/WebstormProjects/xiaolin-docs || { echo "Project directory not found"; exit 1; }
            
            git pull # 拉取最新代码，可选的

            # 确定要使用的镜像标签
            if [ -n "${{ github.event.inputs.image_digest }}" ]; then
              # 使用提供的SHA256摘要
              IMAGE_TAG="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ github.event.inputs.image_digest }}"
            else
              # 使用默认的main标签
              IMAGE_TAG="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
            fi
            
            echo "Using image: ${IMAGE_TAG}"
            
            # 更新docker-compose.yaml中的镜像标签
            if [ -n "${{ github.event.inputs.image_digest }}" ]; then
              # 使用SHA256摘要更新vitepress-website服务的镜像
              sed -i "/vitepress-website:/,/^[[:space:]]*image:/ s|image: .*|image: ${IMAGE_TAG}|g" docker-compose.yaml
            fi
            
            # 停止并移除旧的容器
            docker compose down || true
            
            # 启动新的容器
            docker compose up -d
            
            # 清理未使用的镜像
            docker image prune -f
            
            echo "Deployment completed successfully!"

      # 发送部署成功邮件通知
      - name: Send deployment success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 应用部署完成 - ${{ github.repository }}"
          to: xing.xiaolin@foxmail.com
          from: GitHub Actions
          html_body: |
            <h2>应用已成功部署到目标服务器</h2>
            <p><strong>仓库：</strong>${{ github.repository }}</p>
            <p><strong>分支：</strong>${{ github.ref_name }}</p>
            <p><strong>提交：</strong>${{ github.sha }}</p>
            <p><strong>镜像：</strong>${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:release</p>
            <p><strong>时间：</strong>$(date)</p>
            <hr>
            <p><small>此邮件由 GitHub Actions 自动发送</small></p>