name: CD Pipeline, Deploy to Tencent Cloud Server

on:
  # CD 流水线触发方式
  workflow_dispatch: # 手动点击触发
  workflow_run:
    # 当 CI 流水线成功完成后自动触发
    workflows: ["CI Pipeline, To Alibaba Cloud Container Registry"]
    types:
      - completed

# 定义环境变量
env:
  REGISTRY: ghcr.io # GitHub Container Registry
  IMAGE_NAME: ${{ github.repository }} # 系统环境变量，所在 GitHub 仓库名

jobs:
  deploy-to-server:
    # 仅在 CI 成功完成时运行
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to target server via SSH with password
        run: |
          # 安装 sshpass 工具用于密码认证
          sudo apt-get update
          sudo apt-get install -y sshpass
          
          # 获取镜像标签
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          
          # 创建临时部署脚本
          cat > deploy-script.sh << EOF
          #!/bin/bash
          set -e
          
          # 定义镜像标签变量
          IMAGE_TAG="${IMAGE_TAG}"
          
          # 拉取最新的镜像
          echo "Pulling image: \$IMAGE_TAG"
          docker pull \$IMAGE_TAG
          
          # 更新 docker-compose.yaml 中的镜像标签
          sed -i "s|image: .*|image: \$IMAGE_TAG|g" docker-compose.yaml
          
          # 停止并移除旧的容器
          docker-compose down || true
          
          # 启动新的容器
          docker-compose up -d
          
          # 清理未使用的镜像
          docker image prune -f
          
          echo "Deployment completed successfully!"
          EOF
          
          # 通过 sshpass 使用密码认证传输并执行部署脚本
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" scp -o StrictHostKeyChecking=no deploy-script.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/deploy-script.sh
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "chmod +x /tmp/deploy-script.sh && /tmp/deploy-script.sh"
          
          # 清理本地临时文件
          rm -f deploy-script.sh

      # 发送部署成功邮件通知
      - name: Send deployment success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 应用部署完成 - ${{ github.repository }}"
          to: xing.xiaolin@foxmail.com
          from: GitHub Actions
          html_body: |
            <h2>应用已成功部署到目标服务器</h2>
            <p><strong>仓库：</strong>${{ github.repository }}</p>
            <p><strong>分支：</strong>${{ github.ref_name }}</p>
            <p><strong>提交：</strong>${{ github.sha }}</p>
            <p><strong>镜像：</strong>${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}</p>
            <p><strong>时间：</strong>$(date)</p>
            <hr>
            <p><small>此邮件由 GitHub Actions 自动发送</small></p>