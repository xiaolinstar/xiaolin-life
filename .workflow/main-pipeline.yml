version: '1.0'
name: main-pipeline
displayName: main-pipeline
triggers:
  trigger: auto
  push:
    branches:
      precise:
        - main
stages:
  - name: stage_compile
    displayName: 编译
    strategy: naturally
    trigger: auto
    executor:
      - xingxiaolin
    steps:
      - step: compile@node
        name: node_compile
        displayName: Node.js编译


