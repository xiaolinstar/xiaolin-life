  - name: stage_docker_build
    displayName: 阿里云 ACR 镜像构建
    strategy: naturally
    trigger: auto
    executor:
      - xingxiaolin
    steps:
      - step: build@docker
        name: build_docker
        displayName: 镜像构建
        type: cert
        certificate: 63ef6240-4843-013e-a97a-362c63ba4791
        tag: ${GITEE_REPO}:v0.${GITEE_PIPELINE_BUILD_NUMBER}
        dockerfile: ./Dockerfile
        context: ''
        artifacts: []
        isCache: false
        parameter: {}
        notify: []
        strategy:
          retry: '0'

  - name: stage_push_to_gitee_artifact
    displayName: 推送镜像到Gitee制品库
    strategy: naturally
    trigger: auto
    executor:
      - xingxiaolin
    steps:
      - step: push@docker
        name: push_to_gitee_artifact
        displayName: 推送镜像到Gitee制品库
        type: cert
        certificate: your-gitee-certificate-id
        source: ${GITEE_REPO}:v0.${GITEE_PIPELINE_BUILD_NUMBER}
        target: your-gitee-artifact-repo:v0.${GITEE_PIPELINE_BUILD_NUMBER}
        notify: []
        strategy:
          retry: '0'

  - name: stage_production_deployment
    displayName: 生产环境部署
    strategy: naturally
    trigger: auto
    executor:
      - xingxiaolin
    steps:
      - step: deploy@tencentcloud
        name: lighthouse_deployment
        displayName: 腾讯云轻量应用服务器部署
        type: cert
        certificate: your-tencentcloud-certificate-id
        instance-id: your-tencentcloud-instance-id
        region: your-tencentcloud-region
        command: "ssh root@10.0.4.5 \"docker pull your-gitee-artifact-repo:v0.${GITEE_PIPELINE_BUILD_NUMBER} && docker run -d -p 80:80 your-gitee-artifact-repo:v0.${GITEE_PIPELINE_BUILD_NUMBER}\""
        notify: []
        strategy:
          retry: '3'